<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plumbob — Sims Life Path Generator</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400;1,9..144,700;1,9..144,900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.577.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        oklch(96.5% 0.012 85);
      --cream-mid:    oklch(93%   0.018 85);
      --cream-dark:   oklch(87%   0.026 85);
      --green:        oklch(61%   0.23  148);
      --green-btn:    oklch(46%   0.23  148);
      --green-ink:    oklch(34%   0.18  148);
      --green-light:  oklch(73%   0.19  148);
      --green-glow:   oklch(61%   0.23  148 / 0.22);
      --green-subtle: oklch(93%   0.055 148);
      --amber:        oklch(74%   0.16  72);
      --ink:          oklch(21%   0.04  85);
      --ink-mid:      oklch(38%   0.03  85);
      --ink-soft:     oklch(43%   0.022 85);
    }

    html { font-size: 16px; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0 1.5rem 5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding-top: clamp(2.5rem, 6vw, 5rem);
      margin-bottom: clamp(2.5rem, 5vw, 4rem);
    }

    .plumbob-wrap {
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .plumbob {
      width: 56px;
      height: 72px;
      filter: drop-shadow(0 6px 18px var(--green-glow));
      transition: filter 0.3s ease;
      transform-origin: center;
    }

    .plumbob.spin {
      animation: gem-spin 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes gem-spin {
      0%   { transform: rotateY(0deg) scale(1); filter: drop-shadow(0 6px 18px var(--green-glow)); }
      40%  { transform: rotateY(180deg) scale(1.18); filter: drop-shadow(0 6px 36px oklch(61% 0.23 148 / 0.55)); }
      70%  { transform: rotateY(320deg) scale(1.07); }
      100% { transform: rotateY(360deg) scale(1); filter: drop-shadow(0 6px 18px var(--green-glow)); }
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 900;
      font-size: clamp(3rem, 9vw, 5.5rem);
      line-height: 0.92;
      letter-spacing: -0.025em;
      color: var(--ink);
    }

    .subtitle {
      margin-top: 0.85rem;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--ink-soft);
      letter-spacing: 0.06em;
    }

    /* ── App shell ── */
    .app {
      width: 100%;
      max-width: 520px;
    }

    /* ── Mode toggle ── */
    .mode-section {
      margin-bottom: 1.75rem;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--cream-mid);
      border-radius: 10px;
      padding: 4px;
      gap: 0;
    }

    .seg-btn {
      padding: 0.75rem 1rem;
      min-height: 44px;
      border-radius: 7px;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .seg-btn:focus-visible {
      outline: 2px solid var(--green-ink);
      outline-offset: 2px;
    }

    .seg-btn.active {
      background: var(--cream);
      color: var(--green-ink);
      font-weight: 600;
      box-shadow: 0 1px 4px oklch(0% 0 0 / 0.08);
    }

    .mode-hint {
      margin-top: 0.6rem;
      font-size: 1rem;
      color: var(--ink-soft);
      text-align: center;
      min-height: 1.3em;
    }

    /* ── Categories ── */
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 1.75rem;
      animation: fade-up 0.3s ease;
    }

    .categories.hidden { display: none; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.6rem 1rem;
      min-height: 44px;
      border-radius: 999px;
      border: 1.5px solid var(--cream-dark);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--ink-mid);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }

    .cat-pill:focus-visible {
      outline: 2px solid var(--green-ink);
      outline-offset: 2px;
    }

    .cat-pill:hover {
      border-color: var(--green-ink);
      color: var(--green-ink);
      background: var(--green-subtle);
    }

    .cat-pill.selected {
      border-color: var(--green-ink);
      background: var(--green-ink);
      color: oklch(97% 0.01 148);
      font-weight: 500;
    }

    /* ── Generate button ── */
    .generate-btn {
      width: 100%;
      padding: 1.05rem 2rem;
      border-radius: 10px;
      border: none;
      background: var(--green-btn);
      color: oklch(97% 0.01 148);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 22px var(--green-glow);
      margin-bottom: 3rem;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px oklch(46% 0.23 148 / 0.38);
    }

    .generate-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px var(--green-glow);
    }

    .generate-btn:focus-visible {
      outline: 2px solid var(--green-ink);
      outline-offset: 3px;
    }

    /* ── Result ── */
    .result {
      width: 100%;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .result.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .result-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green-ink);
      margin-bottom: 0.85rem;
    }

    .result-rule {
      width: 100%;
      height: 1px;
      background: var(--cream-dark);
      margin-bottom: 1.6rem;
    }

    .result-path {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(2.1rem, 7vw, 3.2rem);
      line-height: 1.02;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 0.35rem;
    }

    .result-direction {
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--ink-mid);
      margin-bottom: 1.6rem;
    }

    .result-vibe {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--ink-mid);
      border-left: 3px solid var(--green-ink);
      padding-left: 1.1rem;
      margin-bottom: 2rem;
    }

    .result-actions {
      display: flex;
      gap: 0.65rem;
    }

    .reroll-btn {
      flex: 1;
      padding: 0.72rem 1.25rem;
      min-height: 44px;
      border-radius: 8px;
      border: 1.5px solid var(--green-ink);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--green-ink);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .reroll-btn:hover { background: var(--green-subtle); }
    .reroll-btn:active { transform: scale(0.98); }
    .reroll-btn:focus-visible { outline: 2px solid var(--green-ink); outline-offset: 2px; }

    .newpath-btn {
      padding: 0.72rem 1.25rem;
      min-height: 44px;
      border-radius: 8px;
      border: none;
      background: var(--cream-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .newpath-btn:hover {
      background: var(--cream-dark);
      color: var(--ink-mid);
    }
    .newpath-btn:focus-visible { outline: 2px solid var(--ink-mid); outline-offset: 2px; }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .plumbob.spin { animation: none; }
      .categories { animation: none; }
      .result { transition: opacity 0.15s ease; }
      .generate-btn, .seg-btn, .reroll-btn { transition: none; }
    }

    /* ── Icons ── */
    .icon {
      width: 1em;
      height: 1em;
      stroke-width: 1.75;
      vertical-align: -0.13em;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      margin-top: 5rem;
      font-size: 0.75rem;
      color: var(--ink-soft);
      text-align: center;
      letter-spacing: 0.04em;
    }
  </style>
</head>

  </main>

    // ── State ──
    let selectedCategory = null;
    let lastResult = null;
    let guided = false;

    // ── Elements ──
    const btnChaos  = document.getElementById('btn-chaos');
    const btnGuided = document.getElementById('btn-guided');
    const hint      = document.getElementById('mode-hint');
    const cats      = document.getElementById('categories');
    const genBtn    = document.getElementById('generate-btn');
    const result    = document.getElementById('result');
    const plumbob   = document.getElementById('plumbob');

    // ── Mode toggle ──
    function setMode(isGuided) {
      guided = isGuided;
      btnChaos.classList.toggle('active', !guided);
      btnGuided.classList.toggle('active', guided);

      if (guided) {
        hint.textContent = selectedCategory
          ? `Rolling within ${DATA[selectedCategory].label}.`
          : 'Pick a category, or leave blank for a random one.';
        cats.classList.remove('hidden');
        genBtn.textContent = selectedCategory
          ? `Roll Within ${DATA[selectedCategory].label}`
          : 'Generate My Destiny';
      } else {
        hint.textContent = 'Fully random — the cosmos decides everything.';
        cats.classList.add('hidden');
        selectedCategory = null;
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('selected'));
        genBtn.textContent = 'Generate My Destiny';
      }
    }

    btnChaos.addEventListener('click', () => setMode(false));
    btnGuided.addEventListener('click', () => setMode(true));

    // ── Init icons ──
    lucide.createIcons();

    // ── Category pills ──
    document.querySelectorAll('.cat-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const key = pill.dataset.key;
        if (selectedCategory === key) {
          selectedCategory = null;
          pill.classList.remove('selected');
        } else {
          selectedCategory = key;
          document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('selected'));
          pill.classList.add('selected');
        }
        updateSlider();
      });
    });

    // ── Generate ──
    function pick(pool) {
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function generate(forcePool) {
      let pool;
      if (forcePool) {
        pool = forcePool;
      } else if (selectedCategory) {
        pool = DATA[selectedCategory].entries.map(e => ({
          ...e, category: DATA[selectedCategory].label, iconName: DATA[selectedCategory].iconName
        }));
      } else {
        pool = Object.values(DATA).flatMap(cat =>
          cat.entries.map(e => ({ ...e, category: cat.label, iconName: cat.iconName }))
        );
      }
      return pick(pool);
    }

    function showResult(entry) {
      lastResult = entry;
      const iconEl = document.getElementById('result-icon');
      iconEl.setAttribute('data-lucide', entry.iconName);
      lucide.createIcons({ nodes: [iconEl] });
      document.getElementById('result-eyebrow').textContent   = entry.category;
      document.getElementById('result-path').textContent      = entry.path;
      document.getElementById('result-direction').textContent = entry.direction;
      document.getElementById('result-vibe').textContent      = entry.vibe;

      result.classList.remove('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => result.classList.add('visible')));
    }

    function spinAndGenerate(pool) {
      plumbob.classList.remove('spin');
      requestAnimationFrame(() => {
        plumbob.classList.add('spin');
        plumbob.addEventListener('animationend', () => plumbob.classList.remove('spin'), { once: true });
      });
      showResult(generate(pool));
    }

    genBtn.addEventListener('click', () => spinAndGenerate(null));

    document.getElementById('reroll-btn').addEventListener('click', () => {
      // Reroll within same category
      const pool = lastResult
        ? Object.values(DATA).flatMap(cat =>
            cat.entries
              .filter(e => e.path === lastResult.path || cat.label === lastResult.category)
              .map(e => ({ ...e, category: cat.label, iconName: cat.iconName }))
          )
        : null;
      spinAndGenerate(pool?.length ? pool : null);
    });

    document.getElementById('newpath-btn').addEventListener('click', () => {
      result.classList.remove('visible');
      selectedCategory = null;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('selected'));
      setMode(false);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // init
    setMode(false);
  </script>
